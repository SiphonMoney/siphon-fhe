version: '3.8'

# Production Docker Compose for AWS Deployment
# Use: docker-compose -f docker-compose.prod.yml up -d

services:
  # 1. Python Trade Executor (The Manager)
  trade-executor:
    build: ./trade-executor
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/siphon-trade-executor:${VERSION:-latest}
    container_name: siphon-trade-executor
    ports:
      - "5005:5005"
    environment:
      # Allow large FHE uploads (compressed server key ~23MB). Flask default is 16MB → 413.
      - MAX_CONTENT_LENGTH=134217728
      # Connect to FHE Engine (service name 'fhe-engine' acts as hostname)
      - FHE_ENGINE_URL=http://fhe-engine:5001/evaluateStrategy
      - FHE_ENGINE_BRACKET_URL=http://fhe-engine:5001/evaluate_bracket_order
      - FHE_ENGINE_LIMIT_BUY_URL=http://fhe-engine:5001/evaluate_limit_buy
      - FHE_ENGINE_LIMIT_SELL_URL=http://fhe-engine:5001/evaluate_limit_sell

      # External Services
      - PYTH_HERMES_URL=https://hermes.pyth.network
      - ARKIV_RPC_URL=${ARKIV_RPC_URL}

      # Solana RPC
      - SOLANA_RPC_URL=${SOLANA_RPC_URL}

      # Absolute path — Flask-SQLAlchemy otherwise nests relative sqlite URLs under /app/instance/
      - DATABASE_URI=sqlite:////app/data/strategies.db?timeout=30

      # Auth (must match across services)
      - API_TOKEN=${API_TOKEN}

      # Secrets
      - SYPHON_VAULT_CONTRACT_ADDRESS=${SYPHON_VAULT_CONTRACT_ADDRESS}
      - EXECUTOR_PRIVATE_KEY=${EXECUTOR_PRIVATE_KEY}

      # EVM (Sepolia) — required for the on-chain ZK withdraw + Uniswap swap path
      - ETH_RPC_URL=${ETH_RPC_URL}
      - EVM_EXECUTOR_KEY=${EVM_EXECUTOR_KEY}
      - ENTRYPOINT_ADDRESS=${ENTRYPOINT_ADDRESS}
      - UNISWAP_V3_ROUTER=${UNISWAP_V3_ROUTER}
      - WETH_ADDRESS=${WETH_ADDRESS}
      - USDC_ADDRESS=${USDC_ADDRESS}
      - DB_ENCRYPTION_KEY=${DB_ENCRYPTION_KEY}
      - JUPITER_API_URL=${JUPITER_API_URL:-https://quote-api.jup.ag/v6}
      - LIFI_API_KEY=${LIFI_API_KEY:-}
      - SKIP_ZK_VERIFY=${SKIP_ZK_VERIFY:-false}
      - DECRYPTOR_URL=${DECRYPTOR_URL:-http://35.200.184.7:5002}

    volumes:
      # Persist database
      - trade-executor-data:/app/data
    depends_on:
      fhe-engine:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5005/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # 2. Rust FHE Engine (The Calculator)
  fhe-engine:
    build: ./fhe
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/siphon-fhe-engine:${VERSION:-latest}
    container_name: syphon-fhe-engine
    ports:
      - "5001:5001"
    environment:
      - RUST_LOG=info
      - API_TOKEN=${API_TOKEN}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'  # box has 2 vCPUs; '4' exceeds the daemon limit and breaks `up -d`
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Encryption happens in the browser (siphon-app/fhe-wasm); the client uploads only the
  # server key + ciphertext. There is no server-side payload generator.

volumes:
  trade-executor-data:
    driver: local

networks:
  default:
    name: siphon-network
    driver: bridge
