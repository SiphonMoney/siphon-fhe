version: '3.8'

services:
  # 0. Caddy Reverse Proxy (HTTPS)
  caddy:
    image: caddy:2-alpine
    container_name: siphon-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - trade-executor
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: siphon-postgres
    environment:
      POSTGRES_USER: siphon
      POSTGRES_PASSWORD: siphon_secure_pass
      POSTGRES_DB: siphon_strategies
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U siphon" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # 1. Python Trade Executor (The Manager)
  trade-executor:
    build: ./trade-executor
    container_name: siphon-trade-executor
    ports:
      - "5005:5005"
    environment:
      - FHE_ENGINE_URL=http://fhe-engine:5001/evaluateStrategy
      - PYTH_HERMES_URL=https://hermes.pyth.network
      - DATABASE_URI=postgresql://siphon:siphon_secure_pass@postgres:5432/siphon_strategies
      - HELIUS_API_KEY=${HELIUS_API_KEY}
      - SOLANA_NETWORK=${SOLANA_NETWORK:-devnet}
      - EXECUTOR_PRIVATE_KEY=${EXECUTOR_PRIVATE_KEY}
    volumes:
      - trade-executor-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      fhe-engine:
        condition: service_started
    restart: unless-stopped

  # 2. Rust FHE Engine (The Calculator)
  fhe-engine:
    build: ./fhe
    container_name: syphon-fhe-engine
    ports:
      - "5001:5001"
    environment:
      - RUST_LOG=info
    restart: unless-stopped

  # 3. Rust Payload Generator — DEPRECATED.
  # Encryption now happens in the browser (siphon-app/fhe-wasm). The client generates FHE keys,
  # encrypts bounds locally, and uploads only the server key + ciphertext. This service is no
  # longer in the data path and is intentionally not started. See siphon-payload-generator-demo/README.md.
  # payload-generator:
  #   build: ./siphon-payload-generator-demo
  #   ...

  # 4. Proving Relayer (ZK proof generation)
  proving-relayer:
    build: ./proving-relayer
    container_name: siphon-proving-relayer
    ports:
      - "5010:5010"
    environment:
      - ZKEY_PATH=/app/zk/zkey_final.zkey
      - WASM_PATH=/app/zk/main.wasm
      - WITNESS_GEN_JS=/app/zk/generate_witness.js
      - RAPIDSNARK_BIN=/usr/local/bin/rapidsnark
      - NODE_BIN=node
    volumes:
      - ../siphon-zk/circuits/build/zkey_final.zkey:/app/zk/zkey_final.zkey:ro
      - ../siphon-zk/circuits/build/main_js/main.wasm:/app/zk/main.wasm:ro
      - ../siphon-zk/circuits/build/main_js/generate_witness.js:/app/zk/generate_witness.js:ro
    restart: unless-stopped

volumes:
  trade-executor-data:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local
  postgres_data:
    driver: local
