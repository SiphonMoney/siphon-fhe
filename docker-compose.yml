version: '3.8'

services:
  # 0. Caddy Reverse Proxy (HTTPS)
  caddy:
    image: caddy:2-alpine
    container_name: siphon-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - trade-executor
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: siphon-postgres
    environment:
      POSTGRES_USER: siphon
      POSTGRES_PASSWORD: siphon_secure_pass
      POSTGRES_DB: siphon_strategies
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      # -d siphon_strategies: probe the real DB so the readiness check doesn't log
      # "FATAL: database \"siphon\" does not exist" (pg_isready defaults dbname to the username).
      test: [ "CMD-SHELL", "pg_isready -U siphon -d siphon_strategies" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # 1. Python Trade Executor (The Manager)
  trade-executor:
    build: ./trade-executor
    container_name: siphon-trade-executor
    ports:
      - "5005:5005"
    environment:
      - FHE_ENGINE_URL=http://fhe-engine:5001/evaluateStrategy
      - PYTH_HERMES_URL=https://hermes.pyth.network
      - DATABASE_URI=postgresql://siphon:siphon_secure_pass@postgres:5432/siphon_strategies
      - HELIUS_API_KEY=${HELIUS_API_KEY}
      - SOLANA_NETWORK=${SOLANA_NETWORK:-devnet}
      - EXECUTOR_PRIVATE_KEY=${EXECUTOR_PRIVATE_KEY}
      - DECRYPTOR_URL=${DECRYPTOR_URL:-http://decryptor:5002}
      # --- required by config.py (raises if missing) ---
      # Reuse the local postgres for the note/nullifier DB (no Supabase needed for local dev).
      - NOTE_DB_URI=${NOTE_DB_URI:-postgresql://siphon:siphon_secure_pass@postgres:5432/siphon_strategies}
      - SERVER_HMAC_SECRET=${SERVER_HMAC_SECRET:-localdev_hmac_secret_change_me}
      - DB_ENCRYPTION_KEY=${DB_ENCRYPTION_KEY:-localdev_db_encryption_key_change_me}
      - API_TOKEN=${API_TOKEN:-testtoken123}
      # Self-referential base URL — executor_runner calls its OWN /nullifier-registry (port 5005,
      # NOT the 5002 default which is the decryptor!).
      - TRADE_EXECUTOR_BASE_URL=http://localhost:5005
      - CHECK_INTERVAL_SECONDS=${CHECK_INTERVAL_SECONDS:-10}
      # --- ETH Sepolia (upgraded TWAP/grid contracts) ---
      - ETH_SEPOLIA_RPC=${ETH_SEPOLIA_RPC:-https://ethereum-sepolia-rpc.publicnode.com}
      - ETH_SEPOLIA_ENTRYPOINT=${ETH_SEPOLIA_ENTRYPOINT:-0x342326835884b65C27c00249506dA440590FFb6f}
      - ETH_SEPOLIA_UNISWAP_V3_ROUTER=${ETH_SEPOLIA_UNISWAP_V3_ROUTER:-}
      - ETH_SEPOLIA_UNISWAP_V3_FACTORY=${ETH_SEPOLIA_UNISWAP_V3_FACTORY:-}
      - ETH_SEPOLIA_WETH=${ETH_SEPOLIA_WETH:-}
      - ETH_SEPOLIA_USDC=${ETH_SEPOLIA_USDC:-}
      # Funded Sepolia signer the proofs are bound to (MUST equal the frontend's
      # NEXT_PUBLIC_ETH_SEPOLIA_EXECUTOR_ADDRESS). No 0x prefix needed.
      - ETH_SEPOLIA_EXECUTOR_KEY=${ETH_SEPOLIA_EXECUTOR_KEY:-}
      # --- admin allow-list (Sepolia is gated) ---
      - ADMIN_API_TOKEN=${ADMIN_API_TOKEN:-}
      - ADMIN_GATED_CHAIN_IDS=${ADMIN_GATED_CHAIN_IDS:-11155111}
      - ETH_SEPOLIA_ADMIN_WALLETS=${ETH_SEPOLIA_ADMIN_WALLETS:-0xd5720Ed6e70a128C025D0C284874cd1e33B39688,0x9790a76b15612Cd9323dca3EA3E81E50aAC09090,0xc5b7b574EE84A9B59B475FE32Eaf908C246d3859}
    volumes:
      - trade-executor-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      fhe-engine:
        condition: service_started
      decryptor:
        condition: service_started
    restart: unless-stopped

  # 2b. Confidential VM decryptor (local dev)
  decryptor:
    build: ./decryptor
    container_name: siphon-decryptor
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
      - SIPHON_DEV_PLAINTEXT_KEY=1
    restart: unless-stopped

  # 2. Rust FHE Engine (The Calculator)
  fhe-engine:
    build: ./fhe
    container_name: syphon-fhe-engine
    ports:
      - "5001:5001"
    environment:
      - RUST_LOG=info
      - RUST_BACKTRACE=full
    restart: unless-stopped

  # Encryption happens in the browser (siphon-app/fhe-wasm): the client generates FHE keys,
  # encrypts bounds locally, and uploads only the server key + ciphertext. There is no
  # server-side payload generator.

  # 3. Proving Relayer (ZK proof generation)
  proving-relayer:
    build: ./proving-relayer
    container_name: siphon-proving-relayer
    ports:
      - "5010:5010"
    environment:
      - ZKEY_PATH=/app/zk/zkey_final.zkey
      - WASM_PATH=/app/zk/main.wasm
      - WITNESS_GEN_JS=/app/zk/generate_witness.js
      - RAPIDSNARK_BIN=/usr/local/bin/rapidsnark
      - NODE_BIN=node
    volumes:
      - ../siphon-zk/circuits/build/zkey_final.zkey:/app/zk/zkey_final.zkey:ro
      - ../siphon-zk/circuits/build/main_js/main.wasm:/app/zk/main.wasm:ro
      - ../siphon-zk/circuits/build/main_js/generate_witness.js:/app/zk/generate_witness.js:ro
    restart: unless-stopped

volumes:
  trade-executor-data:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local
  postgres_data:
    driver: local
